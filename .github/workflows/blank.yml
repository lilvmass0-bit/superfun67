name: Build EXE safely

on: [push, workflow_dispatch] # Runs every time you upload or click "Run"

jobs:
  build:
    runs-on: windows-latest # This is the "Safe Room" (Windows VM)

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install PyInstaller
      run: pip install pyinstaller

    - name: Build the EXE
      run: pyinstaller --onefile your_script.py # Replace your_script.py with your file name

    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: converted-exe
        path: dist/*.exe
